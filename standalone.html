<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>5/12 注意股處置風險工作台</title>
    <style>
:root {
  --bg: #f4f1ea;
  --ink: #171717;
  --muted: #6f6a61;
  --line: #d9d1c4;
  --panel: #fffaf0;
  --panel-2: #ede7dc;
  --danger: #b3261e;
  --warn: #9f6a00;
  --ok: #1f6f55;
  --accent: #174ea6;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--ink);
  background:
    linear-gradient(90deg, rgba(23, 78, 166, 0.04) 1px, transparent 1px),
    linear-gradient(rgba(23, 78, 166, 0.04) 1px, transparent 1px),
    var(--bg);
  background-size: 28px 28px;
  font-family: "Aptos", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
}

.shell {
  width: min(1480px, calc(100vw - 32px));
  margin: 24px auto;
}

.mast {
  min-height: 132px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 3px solid var(--ink);
  padding-bottom: 18px;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--accent);
  font-size: 12px;
  letter-spacing: 0.14em;
  font-weight: 800;
}

h1 {
  margin: 0;
  font-family: Georgia, "Noto Serif TC", serif;
  font-size: clamp(30px, 4vw, 64px);
  letter-spacing: 0;
}

.meta {
  display: grid;
  gap: 8px;
  text-align: right;
  color: var(--muted);
  font-size: 13px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin: 18px 0;
}

.summary-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 14px;
  min-height: 104px;
  box-shadow: 3px 3px 0 rgba(23, 23, 23, 0.08);
}

.summary-card b {
  display: block;
  font-size: 28px;
  margin-top: 10px;
}

.summary-card span {
  color: var(--muted);
  font-size: 13px;
}

.toolbar {
  display: flex;
  gap: 12px;
  margin: 22px 0 12px;
}

.search-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 12px;
}

input,
select {
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: white;
  color: var(--ink);
  font: inherit;
}

input {
  width: 100%;
  border: 0;
  outline: 0;
}

select {
  padding: 0 12px;
}

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 390px;
  gap: 16px;
  align-items: start;
}

.table-panel,
.detail-panel {
  background: rgba(255, 250, 240, 0.92);
  border: 1px solid var(--line);
  border-radius: 6px;
}

.table-panel {
  display: grid;
  gap: 14px;
  overflow: visible;
  max-height: none;
  background: transparent;
  border: 0;
}

.table-group {
  background: rgba(255, 250, 240, 0.92);
  border: 1px solid var(--line);
  border-radius: 6px;
  overflow: hidden;
}

.table-group:last-child {
  border-bottom: 1px solid var(--line);
}

.group-table {
  max-height: 300px;
  overflow: auto;
}

.group-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--panel-2);
  border-bottom: 1px solid var(--line);
  font-weight: 900;
}

.group-title small {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th,
td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  white-space: nowrap;
}

th {
  position: sticky;
  top: 0;
  background: var(--ink);
  color: white;
  font-size: 12px;
  cursor: pointer;
  z-index: 2;
}

tr {
  cursor: pointer;
}

tr:hover,
tr.selected {
  background: #e8eef9;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.pill.danger {
  background: #f8d8d5;
  color: var(--danger);
}

.pill.warn {
  background: #f4e2bd;
  color: var(--warn);
}

.pill.ok {
  background: #d8eadf;
  color: var(--ok);
}

.detail-panel {
  position: sticky;
  top: 16px;
  padding: 18px;
}

.detail-title {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
}

.detail-title h2 {
  margin: 0;
  font-size: 24px;
}

.code {
  color: var(--muted);
  font-weight: 700;
}

.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 16px 0;
}

.metric {
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px;
}

.metric span {
  display: block;
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 5px;
}

.metric b {
  font-size: 18px;
}

.point-board {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.point-card {
  background: white;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 11px;
}

.point-card span,
.point-card em,
.point-card small {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-style: normal;
}

.point-card b {
  display: block;
  margin: 6px 0;
  font-size: 22px;
}

.point-card small {
  margin-top: 8px;
  line-height: 1.45;
  white-space: normal;
  word-break: keep-all;
}

.point-card.near {
  border: 2px solid var(--warn);
  background: #fff4d6;
  box-shadow: 3px 3px 0 rgba(159, 106, 0, 0.18);
}

.point-card.near span,
.point-card.near b,
.point-card.near em,
.point-card.near small {
  font-weight: 900;
  color: #6f4700;
}

.point-card.hit {
  border: 2px solid var(--danger);
  background: #ffe4e1;
}

.point-card.hit span,
.point-card.hit b,
.point-card.hit em,
.point-card.hit small {
  font-weight: 900;
  color: var(--danger);
}

.section-title {
  margin: 18px 0 8px;
  color: var(--accent);
  font-weight: 900;
  font-size: 13px;
}

.kv {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 8px;
  font-size: 13px;
  padding: 7px 0;
  border-bottom: 1px dashed var(--line);
}

.kv span:first-child {
  color: var(--muted);
}

.empty {
  color: var(--muted);
  min-height: 200px;
  display: grid;
  place-items: center;
}

@media (max-width: 980px) {
  .mast,
  .toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .summary-grid,
  .layout {
    grid-template-columns: 1fr;
  }

  .detail-panel {
    position: static;
  }
}

</style>
  </head>

const GROUPS = [
  ["已被處置_第二次", "已被處置_第二次", "目前處置中，第二次以上處置"],
  ["已被處置_第一次", "已被處置_第一次", "目前處置中，仍追蹤是否碰第二次"],
  ["差一次被處置", "差一次被處置", "已集兩點，尚差 1"],
  ["差兩次被處置", "差兩次被處置", "已集一點，尚差 2"],
];

const nf = new Intl.NumberFormat("zh-TW", { maximumFractionDigits: 2 });

function shortDate(value) {
  if (!value) return "";
  const parts = String(value).split("-");
  return parts.length === 3 ? `${Number(parts[1])}/${Number(parts[2])}` : String(value);
}

function fmt(v) {
  if (v === null || v === undefined || Number.isNaN(v) || v === "") return "-";
  if (typeof v === "number") return nf.format(v);
  return v;
}

function minPriceThreshold(r) {
  const items = [
    ["款1", r["k1_price_threshold"]],
    [`款2${r["k2_nearest_window"] ? ` ${r["k2_nearest_window"]}` : ""}`, r["k2_price_threshold"]],
    ["款6", r["k6_min_price_to_trigger"]],
  ]
    .map(([label, value]) => [label, Number(value)])
    .filter(([, value]) => Number.isFinite(value));
  if (!items.length) return "-";
  items.sort((a, b) => a[1] - b[1]);
  return `${fmt(items[0][1])} (${items[0][0]}，${priceMoveFromPrev(r, items[0][1])})`;
}

function priceMoveFromPrev(r, target) {
  const prev = Number(r["prev_close_for_eval"] ?? r["5_12收盤價"]);
  const price = Number(target);
  if (!Number.isFinite(prev) || prev <= 0 || !Number.isFinite(price)) return "距前收-";
  const pct = ((price - prev) / prev) * 100;
  if (pct <= -11) return "已超過跌停價";
  const sign = pct > 0 ? "+" : "";
  return `距前收 ${sign}${fmt(pct)}%`;
}

function directionLabel(v) {
  if (v === "up") return "上漲";
  if (v === "down") return "下跌";
  return fmt(v);
}

function priceUpDown(up, down) {
  return `上漲 ${fmt(up)} / 下跌 ${fmt(down)}`;
}

function rowGroup(r) {
  if (r["網站分組"]) return r["網站分組"];
  const order = r["目前處置次數"] || r["若5_12觸發_預估處置次數"] || "";
  if (r["處置中_5_12"] && String(order).includes("第二次")) return "已被處置_第二次";
  if (r["處置中_5_12"]) return "已被處置_第一次";
  if (Number(r["最接近類別尚差"]) === 1) return "差一次被處置";
  if (Number(r["最接近類別尚差"]) === 2) return "差兩次被處置";
  return "其他";
}

function riskPill(row) {
  if (row["處置中_5_12"]) return `<span class="pill danger">${fmt(row["目前處置次數"] || "處置中")}</span>`;
  if (row["5_12觸發處置類別"]) return `<span class="pill danger">${row["5_12觸發處置類別"]}</span>`;
  if (Number(row["最接近類別尚差"]) <= 1) return `<span class="pill warn">尚差 ${row["最接近類別尚差"]}</span>`;
  return `<span class="pill ok">觀察</span>`;
}

function renderSummary() {
  const total = rows.length;

    ["差一次被處置", counts["差一次被處置"]],
    ["差兩次被處置", counts["差兩次被處置"]],
  ];
  document.getElementById("summaryGrid").innerHTML = items
    .map(([label, value]) => `<div class="summary-card"><span>${label}</span><b>${fmt(value)}</b></div>`)
    .join("");
}

  filtered.sort((a, b) => {
    const av = a[sortKey];
    const bv = b[sortKey];
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * sortDir;
    return String(av ?? "").localeCompare(String(bv ?? ""), "zh-Hant") * sortDir;
  });
  renderRows();
}

function renderRows() {
  const host = document.getElementById("tableGroups");
  const simpleHeader = `
    <thead>
      <tr>
        <th data-sort="證券代碼">代碼</th>
        <th data-sort="證券名稱">名稱</th>
        <th data-sort="5_12收盤價">收盤</th>
        <th>處置狀態</th>
        <th>處置原因</th>
      </tr>
    </thead>`;
  const header = `
    <thead>
      <tr>
        <th data-sort="證券代碼">代碼</th>
        <th data-sort="證券名稱">名稱</th>
        <th data-sort="5_12收盤價">收盤</th>
        <th>最低價門檻</th>
        <th data-sort="5_12觸發處置類別">狀態</th>
        <th data-sort="最接近類別尚差">尚差</th>
        <th data-sort="最接近類別">最近類別</th>
      </tr>
    </thead>`;
  host.innerHTML = GROUPS.map(([key, title, hint]) => {
    const groupRows = filtered.filter((r) => rowGroup(r) === key);
    const isSecondDisposal = key === "已被處置_第二次";
    const body = groupRows.length
      ? groupRows
          .map(
            (r) => isSecondDisposal
              ? `<tr class="${selectedCode === r["證券代碼"] ? "selected" : ""}" data-code="${r["證券代碼"]}">
        <td class="code">${r["證券代碼"]}</td>
        <td>${r["證券名稱"]}</td>
        <td>${fmt(r["5_12收盤價"])}</td>
        <td>${fmt(r["目前處置次數"] || "處置中")}</td>
        <td>${fmt(r["目前處置原因"])}</td>
      </tr>`
              : `<tr class="${selectedCode === r["證券代碼"] ? "selected" : ""}" data-code="${r["證券代碼"]}">
        <td class="code">${r["證券代碼"]}</td>
        <td>${r["證券名稱"]}</td>
        <td>${fmt(r["5_12收盤價"])}</td>
        <td>${minPriceThreshold(r)}</td>
        <td>${riskPill(r)}</td>
        <td>${fmt(r["最接近類別尚差"])}</td>
        <td>${fmt(r["最接近類別"])}</td>
      </tr>`
          )
          .join("")
      : `<tr><td colspan="${isSecondDisposal ? 5 : 7}" class="empty">沒有符合條件的資料</td></tr>`;
    return `<section class="table-group">
      <div class="group-title"><span>${title}</span><small>${hint} / ${groupRows.length} 檔</small></div>
      <div class="group-table"><table>${isSecondDisposal ? simpleHeader : header}<tbody>${body}</tbody></table></div>
    </section>`;
  }).join("");

  host.querySelectorAll("tr[data-code]").forEach((tr) => {
    tr.addEventListener("click", () => {
      selectedCode = tr.dataset.code;
      renderRows();
      renderDetail(rows.find((r) => r["證券代碼"] === selectedCode));
    });
  });

  host.querySelectorAll("th[data-sort]").forEach((th) => {
    th.addEventListener("click", () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortDir *= -1;
      else {
        sortKey = key;
        sortDir = 1;
      }
      applyFilters();
    });
  });
}

function renderDetail(r) {
  if (!r) return;
  if (rowGroup(r) === "已被處置_第二次") {
    document.getElementById("detailPanel").innerHTML = `
      <div class="detail-title">
        <div>
          <div class="code">${r["證券代碼"]}</div>
          <h2>${r["證券名稱"]}</h2>
        </div>
        ${riskPill(r)}
      </div>
      <div class="metric-grid">
        <div class="metric"><span>收盤價</span><b>${fmt(r["5_12收盤價"])}</b></div>
        <div class="metric"><span>處置中</span><b>是</b></div>
        <div class="metric"><span>目前處置次數</span><b>${fmt(r["目前處置次數"] || "第二次以上處置")}</b></div>
      </div>
      ${kv("處置原因", fmt(r["目前處置原因"]))}
    `;
    return;
  }
  const boards = [
    ["連3第1款", r["加上5_12後連3第1款"], 3, r["連3第1款集點日期"]],
    ["連5第1-8款", r["加上5_12後連5第1到8款"], 5, r["連5第1到8款集點日期"]],
    ["10日6次", r["加上5_12後10日次數"], 6, r["10日6次集點日期"]],
    ["30日12次", r["加上5_12後30日次數"], 12, r["30日12次集點日期"]],
  ];
  document.getElementById("detailPanel").innerHTML = `
    <div class="detail-title">
      <div>
        <div class="code">${r["證券代碼"]}</div>
        <h2>${r["證券名稱"]}</h2>
      </div>
      ${riskPill(r)}
    </div>
    <div class="metric-grid">
      <div class="metric"><span>收盤價</span><b>${fmt(r["5_12收盤價"])}</b></div>
      <div class="metric"><span>成交量(張)</span><b>${fmt(r["5_12成交量千股"])}</b></div>
      <div class="metric"><span>週轉率</span><b>${fmt(r["5_12週轉率"])}%</b></div>
      <div class="metric"><span>可算注意款</span><b>${fmt(r["5_12可算注意款"])}</b></div>
    </div>

    <div class="section-title">四類集點版</div>
    <div class="point-board">
      ${boards.map(([name, value, target, dates]) => pointCard(name, value, target, dates)).join("")}
    </div>
    ${kv("最接近類別", `${r["最接近類別"]}，尚差 ${r["最接近類別尚差"]}`)}
    ${kv(`${shortDate(payload?.eval_date)}處置中`, r["處置中_5_12"] ? "是" : "否")}
    ${kv("目前處置次數", r["目前處置次數"] || "-")}
    ${kv("網站分組", rowGroup(r))}
    ${kv("若觸發預估", r["若5_12觸發_預估處置次數"] ? `${r["若5_12觸發_預估處置次數"]} / ${r["若5_12觸發_預估分盤"]}` : "-")}

    <div class="section-title">價格門檻</div>
    ${kv("最低價門檻", minPriceThreshold(r))}
    ${kv("款1 計算基準", `${shortDate(r["k1_base_date"])} 收盤 ${fmt(r["k1_base_price"])}；前5日累計 ${fmt(r["k1_prev5_return_pct"])}%；前日收盤 ${fmt(r["prev_close_for_eval"])}`)}
    ${kv("款1 條件1門檻", priceUpDown(r["k1_clause1_price_threshold_up"], r["k1_clause1_price_threshold_down"]))}
    ${kv("款1 條件2門檻", `${priceUpDown(r["k1_clause2_price_threshold_up"], r["k1_clause2_price_threshold_down"])}；價差至少 ${fmt(r["k1_clause2_price_diff_threshold"])} 元`)}
    ${kv("款1 採用門檻", `${fmt(r["k1_price_threshold"])}（${fmt(r["k1_nearest_clause"])}，${directionLabel(r["k1_nearest_direction"])}，離現價 ${fmt(r["k1_price_gap"])}）`)}
    ${kv("款1 未取跳動單位前", priceUpDown(r["k1_price_threshold_raw_up"], r["k1_price_threshold_raw_down"]))}
    ${kv("款2 採用基準", `${fmt(r["k2_nearest_window"])}：${shortDate(r["k2_nearest_base_date"])} 收盤 ${fmt(r["k2_nearest_base_price"])}`)}
    ${kv("款2 30日基準", `${shortDate(r["k2_30d_base_date"])} 收盤 ${fmt(r["k2_30d_base_price"])}`)}
    ${kv("款2 60日基準", `${shortDate(r["k2_60d_base_date"])} 收盤 ${fmt(r["k2_60d_base_price"])}`)}
    ${kv("款2 90日基準", `${shortDate(r["k2_90d_base_date"])} 收盤 ${fmt(r["k2_90d_base_price"])}`)}
    ${kv("款2 採用門檻", `${fmt(r["k2_price_threshold"])}（${directionLabel(r["k2_nearest_direction"])}，離現價 ${fmt(r["k2_price_gap"])}）`)}
    ${kv("款2 未取跳動單位前", fmt(r["k2_price_threshold_raw"]))}

    <div class="section-title">成交量與週轉門檻</div>
    ${kv("款3 當日量門檻", `${fmt(r["k3_day_volume_threshold_k"])} 張`)}
    ${kv("款4 週轉量門檻", `${fmt(r["k4_turnover_volume_threshold_k"])} 張`)}
    ${kv("款3 六日累計量估算門檻", `${fmt(r["volume_6d_proxy_threshold_k"])} 張`)}
    ${kv("估算60日均量", `${fmt(r["proxy_avg60_volume_k"])} 張`)}

    <div class="section-title">款6 / PE / PB</div>
    ${kv("款6估算觸發", r["款6_估算觸發"] ? "是" : "否")}
    ${kv("款6最低觸發價", fmt(r["k6_min_price_to_trigger"]))}
    ${kv("款6最低觸發價未取跳動單位前", fmt(r["k6_min_price_to_trigger_raw"]))}
    ${kv("跌停價", fmt(r["limit_down_price"]))}
    ${kv("跌停仍滿足款6價格", r["k6_limit_down_still_triggers"] ? "是" : "否")}
    ${kv("跌停PBR仍超標", r["k6_pbr_limit_down_still_over"] ? "是" : "否")}
    ${kv(`${shortDate(payload?.eval_date)}估算PBR`, fmt(r["pbr_est_512"]))}
    ${kv("PE負值/缺值視為負PE", r["k6_pe_negative"] ? "是" : "否")}
    ${kv("PE 需要高於平均倍數", fmt(r["k6_pe_required_ratio"]))}
    ${kv("款6 PE對應價", fmt(r["k6_price_by_pe_threshold"]))}
    ${kv("款6 PE對應價未取跳動單位前", fmt(r["k6_price_by_pe_threshold_raw"]))}
    ${kv("PBR 需要高於平均倍數", fmt(r["k6_pbr_required_ratio"]))}
    ${kv("款6 PBR對應價", fmt(r["k6_price_by_pbr_threshold"]))}
    ${kv("款6 PBR對應價未取跳動單位前", fmt(r["k6_price_by_pbr_threshold_raw"]))}
    ${kv("只看PBR最低價", fmt(r["k6_pbr_min_price_to_trigger"]))}
    ${kv("款6 5%週轉量", `${fmt(r["k6_turnover_rate_volume_threshold_k"])} 張`)}
    ${kv("款6 最低成交量", `${fmt(r["k6_min_trade_volume_threshold_k"])} 張`)}
    ${kv("款6 推估量門檻", `${fmt(r["k6_turnover_volume_threshold_k"])} 張`)}
    ${kv("反推EPS", fmt(r["eps_from_pe"]))}
    ${kv("款1門檻PE", fmt(r["pe_at_k1_threshold"]))}
    ${kv("款2門檻PE", fmt(r["pe_at_k2_threshold"]))}
    ${kv("PBR註記", r["pbr_note"])}
  `;
}

function kv(k, v) {
  return `<div class="kv"><span>${k}</span><strong>${v}</strong></div>`;
}

function pointCard(name, value, target, dates) {
  const remain = Math.max(0, Number(target) - Number(value || 0));
  const cls = remain === 0 ? "hit" : remain === 1 ? "near" : "";
  return `<div class="point-card ${cls}">
    <span>${name}</span>
    <b>${fmt(value)} / ${target}</b>
    <em>${remain === 0 ? "已達" : `差 ${remain}`}</em>
    <small>${dates || "-"}</small>
  </div>`;
}

async function boot() {
  try {
    payload = await fetch(`./attention_512_results.json?v=${Date.now()}`, { cache: "no-store" }).then((r) => r.json());
  } catch (err) {
    payload = window.__ATTENTION_PAYLOAD__;
  }
  rows = payload.rows || [];
  const evalLabel = shortDate(payload.eval_date);
  document.getElementById("pageTitle").textContent = `${evalLabel} 注意股處置風險工作台`;
  document.getElementById("triggeredOption").textContent = "已公告達處置";
  document.getElementById("activeOption").textContent = `${evalLabel} 處置中`;
  document.getElementById("generatedAt").textContent = `產生時間 ${payload.generated_at}`;
  document.getElementById("asOf").textContent = `注意資料至 ${payload.asof_notice}，評估 ${payload.eval_date}`;
  renderSummary();
  applyFilters();
  if (filtered[0]) {
    selectedCode = filtered[0]["證券代碼"];
    renderDetail(filtered[0]);
    renderRows();
  }
}

document.getElementById("searchInput").addEventListener("input", applyFilters);
document.getElementById("riskFilter").addEventListener("change", applyFilters);

boot().catch((err) => {
  document.body.innerHTML = `<pre>${err.stack || err}</pre>`;
});

</script>
  </body>
</html>
